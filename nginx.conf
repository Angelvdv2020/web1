# NoryxVPN production-ready routing and hardening config
map $host $legacy_redirect_host {
    default "";
    zgproxy.org noryxvpn.store;
    www.zgproxy.org noryxvpn.store;
    app.zgproxy.org app.noryxvpn.store;
    app.zoogvpn.com app.noryxvpn.store;
    www.app.zgproxy.org app.noryxvpn.store;
    www.app.zoogvpn.com app.noryxvpn.store;
}

map $request_uri $removed_sections_redirect {
    default "";
    ~*^/(ru-ru/)?contact/?$ https://noryxvpn.store/help-center/;
    ~*^/(ru-ru/)?contacts?/?$ https://noryxvpn.store/help-center/;
    ~*^/(ru-ru/)?checkout(-christmas|-ru)?/?(\?.*)?$ https://noryxvpn.store/ru-ru/pricing/;
}

server {
    listen 80;
    listen [::]:80;
    server_name noryxvpn.store www.noryxvpn.store app.noryxvpn.store zgproxy.org www.zgproxy.org app.zgproxy.org app.zoogvpn.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name noryxvpn.store www.noryxvpn.store app.noryxvpn.store zgproxy.org www.zgproxy.org app.zgproxy.org app.zoogvpn.com;

    # TLS certs are expected to be mounted by the hosting platform.
    ssl_certificate /etc/ssl/noryx/fullchain.pem;
    ssl_certificate_key /etc/ssl/noryx/privkey.pem;

    if ($host ~* ^www\.(.*)$) { return 301 https://$1$request_uri; }
    if ($legacy_redirect_host != "") { return 301 https://$legacy_redirect_host$request_uri; }
    if ($removed_sections_redirect != "") { return 301 $removed_sections_redirect; }

    root /workspace/web1/public;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

    access_log /var/log/nginx/noryx_access.log;
    error_log /var/log/nginx/noryx_error.log warn;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
