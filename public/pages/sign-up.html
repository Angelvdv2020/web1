<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Noryx — Регистрация</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1120;color:#e2e8f0;margin:0}
    .wrap{max-width:680px;margin:56px auto;padding:0 16px}
    .card{background:#111827;border:1px solid #334155;border-radius:12px;padding:24px}
    h1{margin-top:0}
    .note{background:#1e293b;border-left:4px solid #22c55e;padding:12px;border-radius:8px}
    .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
    a{display:inline-block;padding:10px 14px;border-radius:8px;text-decoration:none;font-weight:700}
    .primary{background:#22c55e;color:#06250f}
    .outline{border:1px solid #94a3b8;color:#e2e8f0}
  </style>
</head>
<body>
  <main class="wrap">
    <article class="card">
      <h1>Регистрация в Noryx</h1>
      <p class="note">Форма регистрации добавлена как отдельная страница. Текущий экран — заглушка.</p>
      <p>Следующий шаг для оплаты тарифа:</p>
      <div class="actions">
        <a class="primary" href="/payment-step-3">Открыть шаг 3: Оплата</a>
        <a class="outline" href="/sign-in">У меня уже есть аккаунт</a>
      </div>
    </article>
  </main>
</body>
</html>
