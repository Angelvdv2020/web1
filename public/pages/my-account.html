<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Noryx — Мой аккаунт</title>
  <meta name="description" content="Личный кабинет Noryx">
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;margin:0}
    .wrap{max-width:760px;margin:40px auto;padding:24px}
    .card{background:#111827;border:1px solid #334155;border-radius:12px;padding:24px}
    h1{margin:0 0 12px;font-size:30px}
    p{line-height:1.5}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    .btn{display:inline-block;padding:12px 18px;border-radius:8px;text-decoration:none;font-weight:700}
    .btn-primary{background:#22c55e;color:#04130a}
    .btn-secondary{background:#1d4ed8;color:#fff}
    .btn-outline{border:1px solid #94a3b8;color:#e2e8f0}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Noryx — Мой аккаунт</h1>
      <p>Вы на домене <strong>noryxvpn.store</strong>. Вход в кабинет сейчас работает в режиме заглушки.</p>
      <p>Для продолжения выберите действие:</p>
      <div class="actions">
        <a class="btn btn-secondary" href="/sign-in">Войти</a>
        <a class="btn btn-primary" href="/register">Регистрация</a>
        <a class="btn btn-outline" href="/payment-step-3">Шаг 3: Оплата</a>
      </div>
    </section>
  </main>
</body>
</html>
