<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Noryx — Вход</title>
  <style>
    body{font-family:Arial,sans-serif;background:#020617;color:#e2e8f0;display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0}
    .panel{background:#111827;border:1px solid #334155;border-radius:12px;padding:28px;max-width:500px;width:100%}
    h1{margin:0 0 10px}
    .muted{color:#94a3b8}
    .actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-block;padding:10px 14px;border-radius:8px;text-decoration:none;font-weight:700}
    .btn-main{background:#22c55e;color:#06250f}
    .btn-alt{background:#1d4ed8;color:#fff}
  </style>
</head>
<body>
  <section class="panel">
    <h1>Вход в Noryx</h1>
    <p class="muted">Это временная заглушка входа. Авторизация будет подключена позже.</p>
    <div class="actions">
      <a class="btn btn-alt" href="/my-account">Назад в аккаунт</a>
      <a class="btn btn-main" href="/register">Перейти к регистрации</a>
    </div>
  </section>
</body>
</html>
